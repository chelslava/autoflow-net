name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: autoflow-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact: autoflow-win-x64.exe
          - os: macos-latest
            rid: osx-x64
            artifact: autoflow-osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/AutoFlow.Cli -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Rename artifact
        shell: bash
        run: |
          cd src/AutoFlow.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            mv autoflow.exe ${{ matrix.artifact }}
          else
            mv autoflow ${{ matrix.artifact }}
          fi
          chmod +x ${{ matrix.artifact }} 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src/AutoFlow.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
