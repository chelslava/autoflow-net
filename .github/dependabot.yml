version: 2
registries:
  nuget-org:
    type: nuget-feed
    url: https://api.nuget.org/v3/index.json

updates:
  # Enable version updates for NuGet
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    reviewers:
      - chelslava
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: "chore(deps)"
    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
      playwright-packages:
        patterns:
          - "Microsoft.Playwright.*"
      xunit-packages:
        patterns:
          - "xunit*"
          - "coverlet.*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    reviewers:
      - chelslava
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
