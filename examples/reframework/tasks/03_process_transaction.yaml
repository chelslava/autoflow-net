schema_version: 1
name: process_transaction

tasks:
  process_transaction:
    inputs:
      employee:
        type: object
        required: true
      employee_index:
        type: int
        required: false
        default: 0
    steps:
      - step:
          id: log_start
          uses: log.info
          with:
            message: "───────────────────────────────────────────────────"

      - step:
          id: log_header
          uses: log.info
          with:
            message: "[PROCESS_TRANSACTION] Processing employee ${employee_index}: ${employee.First Name} ${employee.Last Name}"

      - step:
          id: fill_first_name
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='First Name']/following-sibling::input[1]"
            value: "${employee.First Name}"

      - step:
          id: fill_last_name
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Last Name']/following-sibling::input[1]"
            value: "${employee.Last Name}"

      - step:
          id: fill_company
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Company Name']/following-sibling::input[1]"
            value: "${employee.Company Name}"

      - step:
          id: fill_role
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Role in Company']/following-sibling::input[1]"
            value: "${employee.Role in Company}"

      - step:
          id: fill_address
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Address']/following-sibling::input[1]"
            value: "${employee.Address}"

      - step:
          id: fill_email
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Email']/following-sibling::input[1]"
            value: "${employee.Email}"

      - step:
          id: fill_phone
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Phone Number']/following-sibling::input[1]"
            value: "${employee.Phone Number}"

      - step:
          id: submit_form
          uses: browser.click
          with:
            browserId: "${browser_id}"
            selector: "xpath=//input[@type='submit' and @value='Submit']"
            timeoutMs: "${form_timeout_ms}"

      - step:
          id: log_complete
          uses: log.info
          with:
            message: "[PROCESS_TRANSACTION] ✓ Transaction processed"
