schema_version: 1
name: end_process

tasks:
  end_process:
    steps:
      - step:
          id: log_start
          uses: log.info
          with:
            message: "───────────────────────────────────────────────────"

      - step:
          id: log_header
          uses: log.info
          with:
            message: "[END_PROCESS] Finalizing workflow"

      - step:
          id: get_timestamp
          uses: datetime.now
          with:
            format: "yyyyMMdd_HHmmss"
          save_as:
            value: timestamp

      - step:
          id: create_output_dir
          uses: files.write
          with:
            path: "${output_dir}/.gitkeep"
            content: ""

      - step:
          id: take_final_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "${output_dir}/result_${timestamp}.png"
            fullPage: true

      - step:
          id: log_screenshot
          uses: log.info
          with:
            message: "[END_PROCESS] Screenshot saved: ${output_dir}/result_${timestamp}.png"

      - step:
          id: log_complete
          uses: log.info
          with:
            message: "[END_PROCESS] ✓ Workflow completed successfully"

      - step:
          id: log_footer
          uses: log.info
          with:
            message: "═══════════════════════════════════════════════════"
