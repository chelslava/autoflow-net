schema_version: 1
name: end_process

import:
  - config/settings.yaml

tasks:
  end_process:
    steps:
      - step:
          id: log_start
          uses: log.info
          with:
            message: "───────────────────────────────────────────────────"

      - step:
          id: log_header
          uses: log.info
          with:
            message: "[END_PROCESS] Finalizing workflow"

      - step:
          id: take_final_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "${reports_dir}/final_result.png"
            fullPage: true

      - step:
          id: log_screenshot
          uses: log.info
          with:
            message: "[END_PROCESS] Final screenshot saved"

      - step:
          id: close_browser
          uses: browser.close
          with:
            browserId: "${browser_id}"

      - step:
          id: log_browser_closed
          uses: log.info
          with:
            message: "[END_PROCESS] Browser closed"

      - step:
          id: cleanup_temp
          uses: files.delete
          with:
            path: "${temp_dir}"
          continue_on_error: true

      - step:
          id: log_cleaned
          uses: log.info
          with:
            message: "[END_PROCESS] Temporary files cleaned"

      - step:
          id: log_complete
          uses: log.info
          with:
            message: "[END_PROCESS] ✓ Workflow completed successfully"

      - step:
          id: log_footer
          uses: log.info
          with:
            message: "═══════════════════════════════════════════════════"
