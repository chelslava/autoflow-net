schema_version: 1
name: get_transaction

tasks:
  get_transaction:
    steps:
      - step:
          id: log_start
          uses: log.info
          with:
            message: "───────────────────────────────────────────────────"

      - step:
          id: log_header
          uses: log.info
          with:
            message: "[GET_TRANSACTION] Retrieving transaction data"

      - step:
          id: read_employees
          uses: excel.read
          with:
            path: "${temp_dir}/input.xlsx"
          save_as:
            rows: employees_data
            count: employees_count

      - step:
          id: log_data_loaded
          uses: log.info
          with:
            message: "[GET_TRANSACTION] ✓ Loaded ${employees_count} employee records from Excel"

      - step:
          id: log_complete
          uses: log.info
          with:
            message: "[GET_TRANSACTION] ✓ Transaction data ready"
