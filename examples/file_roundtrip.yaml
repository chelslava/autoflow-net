schema_version: 1
name: file_roundtrip_demo

variables:
  input_path: "output/file_roundtrip/input.txt"
  report_path: "output/file_roundtrip/report.txt"

tasks:
  main:
    steps:
      - step:
          id: get_timestamp
          uses: datetime.now
          with:
            format: "yyyy-MM-dd HH:mm:ss"
          save_as:
            value: created_at

      - step:
          id: write_input
          uses: files.write
          with:
            path: "${input_path}"
            content: "Generated by AutoFlow at ${created_at}"

      - step:
          id: check_input
          uses: files.exists
          with:
            path: "${input_path}"
          save_as:
            exists: input_exists

      - if:
          id: read_and_report
          condition:
            eq:
              - "${input_exists}"
              - true
          then:
            - step:
                id: read_input
                uses: files.read
                with:
                  path: "${input_path}"
                save_as:
                  content: input_content
                  sizeBytes: input_bytes

            - step:
                id: write_report
                uses: files.write
                with:
                  path: "${report_path}"
                  content: |
                    File roundtrip example
                    Created at: ${created_at}
                    Input path: ${input_path}
                    Size bytes: ${input_bytes}
                    Content: ${input_content}

      - step:
          id: log_complete
          uses: log.info
          with:
            message: "File roundtrip report created: ${report_path}"
