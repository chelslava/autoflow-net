schema_version: 1
name: rpa_challenge_reframework

variables:
  challenge_url: "https://rpachallenge.com/"
  excel_url: "https://rpachallenge.com/assets/downloadFiles/challenge.xlsx"
  temp_dir: "temp/rpa_challenge"
  max_retries: 3
  result_screenshot_path: "reports/rpa_result.png"

tasks:
  init:
    steps:
      - step:
          id: log_start
          uses: log.info
          with:
            message: "[INIT] Starting RPA Challenge with REFramework"

      - step:
          id: create_temp_dir
          uses: files.write
          with:
            path: "${temp_dir}/.gitkeep"
            content: ""

      - step:
          id: download_input
          uses: http.request
          with:
            url: "${excel_url}"
            method: GET
            saveToFile: "${temp_dir}/input.xlsx"
            timeoutMs: 30000
          save_as:
            statusCode: download_status

      - step:
          id: open_browser
          uses: browser.open
          with:
            browser: chromium
            headless: true
            width: 1280
            height: 800
          save_as:
            browserId: browser_id

      - step:
          id: navigate_to_challenge
          uses: browser.goto
          with:
            browserId: "${browser_id}"
            url: "${challenge_url}"
            timeoutMs: 30000

      - step:
          id: log_init_done
          uses: log.info
          with:
            message: "[INIT] Initialization complete"

  get_transaction:
    steps:
      - step:
          id: log_get_data
          uses: log.info
          with:
            message: "[GET_TRANSACTION] Retrieving transaction data"

      - step:
          id: read_employees
          uses: excel.read
          with:
            path: "${temp_dir}/input.xlsx"
          save_as:
            rows: employees_data
            count: employees_count

  process_transaction:
    inputs:
      employee:
        type: object
        required: true
      employee_index:
        type: int
        required: false
        default: 0
    steps:
      - step:
          id: log_process_start
          uses: log.info
          with:
            message: "[PROCESS_TRANSACTION] Processing employee ${employee_index}: ${employee.First Name} ${employee.Last Name}"

      - step:
          id: fill_fname
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='First Name']/following-sibling::input[1]"
            value: "${employee.First Name}"

      - step:
          id: fill_lname
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Last Name']/following-sibling::input[1]"
            value: "${employee.Last Name}"

      - step:
          id: fill_company
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Company Name']/following-sibling::input[1]"
            value: "${employee.Company Name}"

      - step:
          id: fill_role
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Role in Company']/following-sibling::input[1]"
            value: "${employee.Role in Company}"

      - step:
          id: fill_address
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Address']/following-sibling::input[1]"
            value: "${employee.Address}"

      - step:
          id: fill_email
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Email']/following-sibling::input[1]"
            value: "${employee.Email}"

      - step:
          id: fill_phone
          uses: browser.fill
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='Phone Number']/following-sibling::input[1]"
            value: "${employee.Phone Number}"

      - step:
          id: submit
          uses: browser.click
          with:
            browserId: "${browser_id}"
            selector: "input[type='submit']"

      - step:
          id: log_process_done
          uses: log.info
          with:
            message: "[PROCESS_TRANSACTION] Form submitted successfully"

  end_process:
    steps:
      - step:
          id: final_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "${result_screenshot_path}"
            fullPage: true

      - step:
          id: log_end_process
          uses: log.info
          with:
            message: "[END_PROCESS] Workflow completed"

      - step:
          id: close_browser
          uses: browser.close
          with:
            browserId: "${browser_id}"

      - step:
          id: cleanup
          uses: files.delete
          with:
            path: "${temp_dir}/input.xlsx"

  main:
    on_error:
      - step:
          id: error_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "reports/error.png"
            fullPage: true

      - step:
          id: log_error
          uses: log.info
          with:
            message: "[SYSTEM_ERROR] Error during execution"

    finally:
      - step:
          id: ensure_browser_closed
          uses: browser.close
          with:
            browserId: "${browser_id}"
          continue_on_error: true

      - step:
          id: ensure_cleanup
          uses: files.delete
          with:
            path: "${temp_dir}/input.xlsx"
          continue_on_error: true

    steps:
      - call:
          id: call_init
          task: init
      - call:
          id: call_get_transaction
          task: get_transaction
      - step:
          id: log_loaded_rows
          uses: log.info
          with:
            message: "[MAIN] Loaded ${employees_count} employee rows"
      - step:
          id: click_start
          uses: browser.click
          with:
            browserId: "${browser_id}"
            selector: "xpath=//button[contains(@class, 'btn-large') and normalize-space()='Start']"
            timeoutMs: 10000
      - step:
          id: wait_form
          uses: browser.wait
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='First Name']/following-sibling::input[1]"
            state: visible
            timeoutMs: 10000
      - for_each:
          id: process_employees
          items: "${employees_data}"
          as: employee
          steps:
            - call:
                id: call_process_transaction
                task: process_transaction
                with:
                  employee: "${employee}"
                  employee_index: "${employee_index}"
      - step:
          id: assert_congratulations
          uses: browser.assert_text
          with:
            browserId: "${browser_id}"
            selector: "body"
            expected: "Congratulations!"
            contains: true
      - call:
          id: call_end_process
          task: end_process
