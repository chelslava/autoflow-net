# RPA Challenge Workflow
#
# This workflow solves the RPA Challenge (http://rpachallenge.com/):
# 1. Download Excel file with employee data
# 2. Parse the data
# 3. Fill web form for each employee
# 4. Measure completion time
#
# The challenge tests RPA skills: data extraction, web automation, speed optimization

schema_version: 1
name: rpa_challenge

variables:
  challenge_url: "https://rpachallenge.com/"
  excel_url: "https://rpachallenge.com/assets/downloadFiles/challenge.xlsx"
  excel_path: "temp/employees.xlsx"
  result_screenshot_path: "reports/rpa_challenge_result.png"

tasks:
  main:
    on_error:
      - step:
          id: error_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "reports/rpa_error.png"

    finally:
      - step:
          id: cleanup_browser
          uses: browser.close
          with:
            browserId: "${browser_id}"
      - step:
          id: cleanup_files
          uses: files.delete
          with:
            path: "${excel_path}"

    steps:
      # Step 1: Create temp directory
      - step:
          id: create_temp_dir
          uses: files.write
          with:
            path: "temp/.gitkeep"
            content: ""

      - step:
          id: create_reports_dir
          uses: files.write
          with:
            path: "reports/.gitkeep"
            content: ""

      # Step 2: Download Excel file with employee data
      - step:
          id: download_excel
          uses: http.request
          with:
            url: "${excel_url}"
            method: GET
            saveToFile: "${excel_path}"
          save_as:
            statusCode: download_status

      - step:
          id: read_employees
          uses: excel.read
          with:
            path: "${excel_path}"
          save_as:
            rows: employees_data
            count: employees_count

      - step:
          id: log_loaded_rows
          uses: log.info
          with:
            message: "Loaded ${employees_count} employees from ${excel_path}"

      # Step 3: Open browser and navigate to challenge
      - step:
          id: open_browser
          uses: browser.open
          with:
            browser: chromium
            headless: true
            width: 1280
            height: 800
          save_as:
            browserId: browser_id

      - step:
          id: goto_challenge
          uses: browser.goto
          with:
            browserId: "${browser_id}"
            url: "${challenge_url}"

      # Step 4: Click Start button
      - step:
          id: click_start
          uses: browser.click
          with:
            browserId: "${browser_id}"
            selector: "xpath=//button[contains(@class, 'btn-large') and normalize-space()='Start']"
            timeoutMs: 10000

      # Step 5: Wait for form to appear
      - step:
          id: wait_form
          uses: browser.wait
          with:
            browserId: "${browser_id}"
            selector: "xpath=//label[normalize-space()='First Name']/following-sibling::input[1]"
            state: visible
            timeoutMs: 10000

      - for_each:
          id: process_employees
          items: "${employees_data}"
          as: employee
          steps:
            - step:
                id: log_employee
                uses: log.info
                with:
                  message: "Processing row ${employee_index}: ${employee.First Name} ${employee.Last Name}"

            - step:
                id: fill_first_name
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='First Name']/following-sibling::input[1]"
                  value: "${employee.First Name}"

            - step:
                id: fill_last_name
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Last Name']/following-sibling::input[1]"
                  value: "${employee.Last Name}"

            - step:
                id: fill_company
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Company Name']/following-sibling::input[1]"
                  value: "${employee.Company Name}"

            - step:
                id: fill_role
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Role in Company']/following-sibling::input[1]"
                  value: "${employee.Role in Company}"

            - step:
                id: fill_address
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Address']/following-sibling::input[1]"
                  value: "${employee.Address}"

            - step:
                id: fill_email
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Email']/following-sibling::input[1]"
                  value: "${employee.Email}"

            - step:
                id: fill_phone
                uses: browser.fill
                with:
                  browserId: "${browser_id}"
                  selector: "xpath=//label[normalize-space()='Phone Number']/following-sibling::input[1]"
                  value: "${employee.Phone Number}"

            - step:
                id: submit_form
                uses: browser.click
                with:
                  browserId: "${browser_id}"
                  selector: "input[type='submit']"

      - step:
          id: assert_congratulations
          uses: browser.assert_text
          with:
            browserId: "${browser_id}"
            selector: "body"
            expected: "Congratulations!"
            contains: true

      # Step 15: Take screenshot of results
      - step:
          id: final_screenshot
          uses: browser.screenshot
          with:
            browserId: "${browser_id}"
            path: "${result_screenshot_path}"
            fullPage: true

      # Step 16: Log success
      - step:
          id: log_success
          uses: log.info
          with:
            message: "RPA Challenge completed successfully! Screenshot saved to ${result_screenshot_path}"
